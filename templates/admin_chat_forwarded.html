{% extends "base.html" %}

{% block title %}Reply to {{ chat['name'] }} - Admin Chat{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-user-circle"></i> Chat with {{ chat['name'] }}</h5>
                    <small>{{ chat['email'] }}</small>
                </div>

                <div class="card-body bg-light" style="height: 400px; overflow-y: auto;">
                    <!-- Original Question -->
                    <div class="mb-3">
                        <div class="alert alert-info">
                            <h6>Original Question:</h6>
                            <p class="mb-0">{{ chat['original_question'] }}</p>
                        </div>
                    </div>

                    <!-- Chat Messages -->
                    <div id="chat-messages"></div>
                </div>

                <div class="card-footer bg-light">
                    <div class="input-group">
                        <input type="text" id="reply-input" class="form-control" placeholder="Type your response..." />
                        <button class="btn btn-success" onclick="sendReply()">
                            <i class="fas fa-paper-plane"></i> Send Reply
                        </button>
                    </div>
                    <small class="text-muted d-block mt-2">
                        <i class="fas fa-envelope"></i> User will receive an email with your response
                    </small>
                </div>
            </div>

            <div class="mt-3">
                <a href="{{ url_for('admin_forwarded_chats_list') }}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Back to Chats
                </a>
            </div>
        </div>
    </div>
</div>

<script>
const chatId = {{ chat['id'] }};
const messagesContainer = document.getElementById('chat-messages');
const replyInput = document.getElementById('reply-input');

function scrollToBottom() {
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

function addMessage(text, isFromAdmin) {
    const msgDiv = document.createElement('div');
    msgDiv.className = 'mb-3 ' + (isFromAdmin ? 'text-end' : 'text-start');
    
    const badge = document.createElement('div');
    badge.className = `badge rounded-pill p-2 d-inline-block ${isFromAdmin ? 'bg-success' : 'bg-info'}`;
    badge.style.maxWidth = '70%';
    badge.style.wordWrap = 'break-word';
    badge.style.whiteSpace = 'pre-wrap';
    badge.innerHTML = (isFromAdmin ? '<i class="fas fa-shield-alt"></i> ' : '<i class="fas fa-user"></i> ') + text;
    
    msgDiv.appendChild(badge);
    messagesContainer.appendChild(msgDiv);
    scrollToBottom();
}

function sendReply() {
    const message = replyInput.value.trim();
    if (!message) return;
    
    // Show message
    addMessage(message, true);
    replyInput.value = '';
    
    // Send to server
    fetch(`/api/admin/reply-chat/${chatId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: message })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            const notif = document.createElement('div');
            notif.className = 'alert alert-success mt-2';
            notif.innerHTML = '<i class="fas fa-check"></i> Reply sent to user via email!';
            messagesContainer.appendChild(notif);
            scrollToBottom();
        } else {
            addMessage('Error: ' + (data.error || 'Unknown error'), false);
        }
    })
    .catch(err => {
        addMessage('Error: ' + err.message, false);
    });
}

// Allow Enter key
replyInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        sendReply();
    }
});
</script>
{% endblock %}
