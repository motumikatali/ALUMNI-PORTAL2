{% extends "base.html" %}

{% block title %}Admin Chat - {{ user['name'] }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-lg-9 mx-auto">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-user-circle"></i> Chat with {{ user['name'] }}
                    </h4>
                    <small>{{ user['email'] }}</small>
                </div>
                
                <div class="card-body" style="height: 500px; overflow-y: auto;" id="chat-box">
                    {% for msg in messages %}
                        <div class="mb-3 {% if msg['is_from_user'] %}text-start{% else %}text-end{% endif %}">
                            <div class="badge {% if msg['is_from_user'] %}bg-info{% else %}bg-success{% endif %} rounded-pill p-2 d-inline-block" style="max-width: 70%; word-wrap: break-word;">
                                {{ msg['content'] }}
                            </div>
                            <small class="d-block mt-1 text-muted">{{ msg['created_at'] }}</small>
                        </div>
                    {% endfor %}
                </div>
                
                <div class="card-footer bg-light">
                    <form id="admin-message-form" class="d-flex gap-2">
                        <input type="text" id="admin-message-input" class="form-control" placeholder="Type your response..." required>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-paper-plane"></i> Send
                        </button>
                    </form>
                </div>
            </div>
            
            <div class="mt-3">
                <a href="{{ url_for('admin_chat_sessions') }}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Back to Sessions
                </a>
            </div>
        </div>
    </div>
</div>

<script>
const sessionId = {{ session['id'] }};
const chatBox = document.getElementById('chat-box');
const messageForm = document.getElementById('admin-message-form');
const messageInput = document.getElementById('admin-message-input');

function scrollToBottom() {
    chatBox.scrollTop = chatBox.scrollHeight;
}

function addMessageToChat(content, isUser) {
    const msgDiv = document.createElement('div');
    msgDiv.className = 'mb-3 ' + (isUser ? 'text-start' : 'text-end');
    msgDiv.innerHTML = `
        <div class="badge ${isUser ? 'bg-info' : 'bg-success'} rounded-pill p-2 d-inline-block" style="max-width: 70%; word-wrap: break-word;">
            ${content}
        </div>
        <small class="d-block mt-1 text-muted">${new Date().toLocaleTimeString()}</small>
    `;
    chatBox.appendChild(msgDiv);
    scrollToBottom();
}

messageForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const message = messageInput.value.trim();
    if (!message) return;
    
    // Show admin message
    addMessageToChat(message, false);
    messageInput.value = '';
    
    try {
        const response = await fetch('/api/admin-chat/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                session_id: sessionId,
                message: message 
            })
        });
        
        const data = await response.json();
        
        if (!data.success) {
            addMessageToChat('Error: ' + (data.error || 'Unknown error'), true);
        }
    } catch (error) {
        addMessageToChat('Error: ' + error.message, true);
    }
});

// Auto-scroll on page load
scrollToBottom();
</script>
{% endblock %}
