{% extends "base.html" %}

{% block title %}AI Assistant{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row h-100">
        <!-- Chat Area -->
        <div class="col-lg-8 mx-auto mt-4">
            <div class="card shadow" style="height: 600px; display: flex; flex-direction: column;">
                <!-- Header -->
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-robot"></i> AI Assistant</h5>
                    <small>Ask me anything about internships, applications, or get help</small>
                </div>

                <!-- Messages Area -->
                <div class="card-body" id="chat-messages" style="overflow-y: auto; flex: 1;">
                    <div class="mb-3">
                        <div class="alert alert-info">
                            <h6><i class="fas fa-lightbulb"></i> Welcome! Click any button below or type your question.</h6>
                        </div>
                    </div>

                    <!-- Quick Action Buttons (Pinned Messages) -->
                    <div class="mb-3" id="quick-actions">
                        <button class="btn btn-outline-primary btn-sm me-2 mb-2" onclick="sendMessage('Tell me about internships')">
                            <i class="fas fa-briefcase"></i> 💼 Internships
                        </button>
                        <button class="btn btn-outline-primary btn-sm me-2 mb-2" onclick="sendMessage('How to apply for jobs')">
                            <i class="fas fa-file-alt"></i> 📄 How to Apply
                        </button>
                        <button class="btn btn-outline-primary btn-sm me-2 mb-2" onclick="sendMessage('How to verify results')">
                            <i class="fas fa-check-circle"></i> ✅ Verify Results
                        </button>
                        <button class="btn btn-outline-primary btn-sm me-2 mb-2" onclick="sendMessage('Tell me about companies')">
                            <i class="fas fa-building"></i> 🏢 Company Info
                        </button>
                        <button class="btn btn-outline-primary btn-sm me-2 mb-2" onclick="sendMessage('I need help')">
                            <i class="fas fa-question-circle"></i> ❓ Help
                        </button>
                    </div>
                </div>

                <!-- Message Input -->
                <div class="card-footer bg-light">
                    <div class="input-group">
                        <input type="text" id="message-input" class="form-control" placeholder="Type your question..." />
                        <button class="btn btn-primary" id="send-button" onclick="sendMessage()">
                            <i class="fas fa-paper-plane"></i> Send
                        </button>
                        <div id="chat-loader" class="spinner-border text-primary ms-2" role="status" style="display:none; width:1.75rem; height:1.75rem;">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const messagesContainer = document.getElementById('chat-messages');
const messageInput = document.getElementById('message-input');
const quickActions = document.getElementById('quick-actions');

function scrollToBottom() {
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

function addMessage(text, isUser) {
    const msgDiv = document.createElement('div');
    msgDiv.className = 'mb-3 ' + (isUser ? 'text-end' : 'text-start');
    
    const badge = document.createElement('div');
    badge.className = `badge rounded-pill p-2 d-inline-block ${isUser ? 'bg-primary' : 'bg-success'}`;
    badge.style.maxWidth = '70%';
    badge.style.wordWrap = 'break-word';
    badge.style.whiteSpace = 'pre-wrap';
    badge.textContent = text;
    
    msgDiv.appendChild(badge);
    messagesContainer.appendChild(msgDiv);
    scrollToBottom();
}

function sendMessage(text = null) {
    const message = text || messageInput.value.trim();
    if (!message) return;
    
    // Hide quick actions on first message
    if (quickActions) {
        quickActions.style.display = 'none';
    }
    
    // Show user message
    addMessage(message, true);
    messageInput.value = '';
    
    // Send to server
    // Show loader & disable send
    const loader = document.getElementById('chat-loader');
    const sendBtn = document.getElementById('send-button');
    if (loader) loader.style.display = 'inline-block';
    if (sendBtn) sendBtn.disabled = true;

    // Client-side timeout: if server doesn't respond in 5s, show fallback
    let timedOut = false;
    const fallbackTimer = setTimeout(() => {
        timedOut = true;
        addMessage("Sorry, I'm taking too long. Try rephrasing or check Jobs and Profile sections.", false);
        if (loader) loader.style.display = 'none';
        if (sendBtn) sendBtn.disabled = false;
    }, 5000);

    fetch('/api/chatbot/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: message })
    })
    .then(r => r.json())
    .then(data => {
        clearTimeout(fallbackTimer);
        if (timedOut) return; // already showed fallback
        if (loader) loader.style.display = 'none';
        if (sendBtn) sendBtn.disabled = false;

        if (data.success) {
            // Show AI response
            addMessage(data.ai_response, false);

            // If escalated, show notification
            if (data.escalated) {
                const notif = document.createElement('div');
                notif.className = 'alert alert-warning mt-2';
                notif.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Your issue has been escalated to the Admin team. They will respond shortly!';
                messagesContainer.appendChild(notif);
                scrollToBottom();
            }
        } else {
            addMessage('Error: ' + (data.error || 'Unknown error'), false);
        }
    })
    .catch(err => {
        clearTimeout(fallbackTimer);
        if (!timedOut) addMessage('Error: ' + err.message, false);
        if (loader) loader.style.display = 'none';
        if (sendBtn) sendBtn.disabled = false;
    });
}

// Allow Enter key to send
messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        sendMessage();
    }
});

scrollToBottom();
</script>
{% endblock %}
